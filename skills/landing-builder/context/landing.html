
<!DOCTYPE html>
<html lang="bg-BG">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Облачна платформа за деплой и хостване | Разработвайте, Преглеждайте, Публикувайте</title>
    <meta name="description" content="Модерна облачна платформа за разработка и деплой на уеб приложения. Глобална edge мрежа, автоматичен деплой и preview среди за вашия екип." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --color-primary: #635BFF;
            --color-primary-hover: #4F46E5;
            --color-primary-light: #7C74FF;
            --color-dark: #0A2540;
            --color-dark-secondary: #0D2F52;
            --color-text: #1A1A2E;
            --color-text-secondary: #5A6475;
            --color-text-light: #8893A7;
            --color-white: #FFFFFF;
            --color-off-white: #F6F9FC;
            --color-bg-light: #FAFBFC;
            --color-bg-gray: #F1F4F8;
            --color-border: #E2E8F0;
            --color-border-light: #EDF2F7;
            --color-success: #00D924;
            --color-gradient-1: #635BFF;
            --color-gradient-2: #A259FF;
            --color-gradient-3: #4CC9F0;
            --color-card-bg: #FFFFFF;
            --color-footer-bg: #0A2540;
            --color-footer-text: #ADBDCC;
            --shadow-sm: 0 1px 3px rgba(10, 37, 64, 0.06), 0 1px 2px rgba(10, 37, 64, 0.04);
            --shadow-md: 0 4px 16px rgba(10, 37, 64, 0.08), 0 2px 6px rgba(10, 37, 64, 0.04);
            --shadow-lg: 0 12px 40px rgba(10, 37, 64, 0.12), 0 4px 16px rgba(10, 37, 64, 0.06);
            --shadow-xl: 0 24px 60px rgba(10, 37, 64, 0.18), 0 8px 24px rgba(10, 37, 64, 0.08);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 350ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-family);
            color: var(--color-text);
            background-color: var(--color-white);
            line-height: 1.6;
            overflow-x: hidden;
            font-size: 16px;
            font-weight: 400;
        }

        /* ============ NAVIGATION ============ */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid transparent;
            transition: all var(--transition-smooth);
            padding: 0 24px;
        }
        .nav.scrolled {
            border-bottom-color: var(--color-border-light);
            box-shadow: var(--shadow-sm);
        }
        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--color-dark);
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
        }
        .nav-logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-gradient-1), var(--color-gradient-2));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            box-shadow: 0 2px 8px rgba(99, 91, 255, 0.35);
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--color-text-secondary);
            font-weight: 500;
            font-size: 0.925rem;
            transition: color var(--transition-fast);
            letter-spacing: -0.01em;
            position: relative;
        }
        .nav-links a:hover {
            color: var(--color-dark);
        }
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: var(--radius-full);
            font-family: var(--font-family);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: all var(--transition-smooth);
            text-decoration: none;
            white-space: nowrap;
            border: none;
            outline: none;
            line-height: 1.4;
        }
        .btn-primary {
            background: var(--color-primary);
            color: var(--color-white);
            box-shadow: 0 2px 12px rgba(99, 91, 255, 0.3);
        }
        .btn-primary:hover {
            background: var(--color-primary-hover);
            box-shadow: 0 4px 20px rgba(99, 91, 255, 0.45);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: transparent;
            color: var(--color-dark);
            border: 1.5px solid transparent;
        }
        .btn-ghost:hover {
            background: var(--color-bg-gray);
            border-color: var(--color-border);
        }
        .btn-outline {
            background: transparent;
            color: var(--color-dark);
            border: 1.5px solid var(--color-border);
        }
        .btn-outline:hover {
            border-color: var(--color-dark);
            background: var(--color-bg-gray);
        }
        .btn-lg {
            padding: 14px 32px;
            font-size: 1rem;
            border-radius: var(--radius-full);
        }
        .btn-white {
            background: var(--color-white);
            color: var(--color-dark);
            box-shadow: var(--shadow-md);
        }
        .btn-white:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        /* Mobile nav */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--color-dark);
            z-index: 1001;
        }
        .mobile-menu-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--color-dark);
            margin: 5px 0;
            border-radius: 2px;
            transition: all var(--transition-smooth);
        }

        /* ============ HERO ============ */
        .hero {
            position: relative;
            padding: 140px 24px 100px;
            overflow: hidden;
            background: var(--color-white);
        }
        .hero-bg {
            position: absolute;
            top: -200px;
            right: -300px;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(99, 91, 255, 0.06) 0%, rgba(162, 89, 255, 0.03) 40%, transparent 70%);
            pointer-events: none;
        }
        .hero-bg-2 {
            position: absolute;
            bottom: -150px;
            left: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(76, 201, 240, 0.05) 0%, transparent 65%);
            pointer-events: none;
        }
        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            text-align: center;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--color-bg-gray);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-full);
            padding: 8px 18px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--color-text-secondary);
            margin-bottom: 28px;
            animation: fadeInUp 0.6s ease-out;
            letter-spacing: -0.01em;
        }
        .hero-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(0, 217, 36, 0.5);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(0, 217, 36, 0);
            }
        }
        .hero-title {
            font-size: clamp(2.5rem, 5.5vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.03em;
            line-height: 1.08;
            color: var(--color-dark);
            margin-bottom: 24px;
            animation: fadeInUp 0.7s ease-out 0.05s both;
        }
        .hero-title-gradient {
            background: linear-gradient(135deg, var(--color-gradient-1) 0%, var(--color-gradient-2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-subtitle {
            font-size: clamp(1.1rem, 2vw, 1.35rem);
            color: var(--color-text-secondary);
            max-width: 650px;
            margin: 0 auto 36px;
            font-weight: 400;
            line-height: 1.55;
            animation: fadeInUp 0.7s ease-out 0.1s both;
            letter-spacing: -0.01em;
        }
        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            animation: fadeInUp 0.7s ease-out 0.15s both;
        }
        .hero-visual {
            margin-top: 64px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            position: relative;
        }
        .hero-card {
            background: var(--color-white);
            border: 1px solid var(--color-border-light);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 0;
            overflow: hidden;
            max-width: 820px;
            margin: 0 auto;
        }
        .hero-card-bar {
            background: var(--color-bg-gray);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--color-border-light);
        }
        .hero-card-dot {
            width: 11px;
            height
